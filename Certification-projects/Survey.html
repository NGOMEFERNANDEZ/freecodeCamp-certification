<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Survey Form</title>
  </head>

  <body>
    <h1 id=title>FreeCodeCamp Survey Form</h1>

    <p>Thank You for taking time to help us improve the platform</p>

    <form id="survey-form" method="POST">

     <label for="name" id="name-label">Name</label>
     <input type="text" id="name" placeholder="Enter your name" minlength="4" maxlength="15" required><br>
     
     <label for="email" id="email-label">Email</label>
     <input type="email" id="email" placeholder="Enter your Email"  required><br>

     <label for="number" id="number-label">Number</label>
     <input type="number" id="number" placeholder="number" min="1" max="50">


     <p id="description">Which option best descrbes your current role?</p>

     <label for="current role" ></label>
     <select id="dropdown">
       <option id="current role">Student</option>
       <option id="current role">Full time job</option>
       <option id="current role">Full time learner</option>
       <option id="current role">Prefer not to say</option>
       <option id="current role">other</option>
     </select><br>

      
     <label for="Would You reccomend FreeCodeCamp to a friend?">Would You reccomend FreeCodeCamp to a friend?</label><br>
     <label for="Definitely">Definitely</label>
     <input type="radio" value="Definitely" name="Would You reccomend FreeCodeCamp to a friend?">
     <label for="Maybe">Maybe</label>
     <input type="radio" value="Maybe" name="Would You reccomend FreeCodeCamp to a friend?">
     <label for="Not sure">Not sure</label>
     <input type="radio" value="Not sure" name="Would You reccomend FreeCodeCamp to a friend?">

       
     <p id="description">What is your favorite feature of freeCodeCamp?</p>
     <label for="Select an option"></label>
     <select>
      <option id="Select an option">Challenges</option>
      <option id="Select an option">Projects</option>
      <option id="Select an option">Community</option>
      <option id="Select an option">Open Source</option>
     </select>

     <p id="description">What would you like to see improved? (Check all that apply)</p>
     <label for="Front-end">Front-end Projects</label>
     <input type="checkbox" value="Front-end">
     <label for="Back-end">Back-end Projects</label>
     <input type="checkbox" value="Back-end Projects">
     <label for="Data">Data Visualization</label>
     <input type="checkbox" value="Data">
     <label for="Challenges">Challenges</label>
     <input type="checkbox" value="Challenges">
     <label for="Community">Community</label>
     <input type="checkbox" value="Community">
     <label for="Gitter">Gitter help rooms</label>
     <input type="checkbox" value="Gitter">
     <label for="Video">Videos</label>
     <input type="checkbox" value="Video">
     <label for="meet">City meet-ups</label>
     <input type="checkbox" value="meet">
     <label for="wiki">Wiki</label>
     <input type="checkbox" value="wiki">
     <label for="forums">Forums</label>
     <input type="checkbox" value="forums">
     <label for="additional">Additional Courses</label>
     <input type="checkbox" value="additional"><br>

     <label for="comment">Any Comments or Suggestions?</label><br>
     <textarea  id="comment" placeholder="Enter your comment here..." rows="3" cols="15"></textarea><br>

     <input type="submit" id="submit">

    </form>
  </body>
</html>
